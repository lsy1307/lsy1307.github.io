<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">S3 보상 삭제 실패 매트릭스</title>
  <desc id="desc">이미지 업로드와 DB 저장 단계에서 실패했을 때 어떤 S3 객체를 삭제하는지 보여주는 카드형 매트릭스</desc>
  <defs>
    <style>
      .bg{fill:#f7f7f4}.card{fill:#ffffff;stroke:#111111;stroke-width:3}.accent{fill:#dededb;stroke:#111111;stroke-width:3}.soft{fill:#ececea;stroke:#111111;stroke-width:2}.ink{fill:#111111}.muted{fill:#626262}text{font-family:Pretendard,'Noto Sans KR',Arial,sans-serif}.title{font-size:38px;font-weight:900}.label{font-size:26px;font-weight:850}.small{font-size:20px;font-weight:700}.tiny{font-size:16px;font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <text x="70" y="78" class="title ink">S3 compensation</text>
  <text x="70" y="114" class="small muted">DB 트랜잭션 밖에서 성공한 업로드만 실패 역순으로 정리</text>

  <rect x="80" y="180" width="310" height="250" rx="26" class="card"/>
  <text x="235" y="235" text-anchor="middle" class="label ink">1. 첫 업로드 실패</text>
  <text x="235" y="285" text-anchor="middle" class="small muted">생성된 객체 없음</text>
  <rect x="125" y="330" width="220" height="60" rx="16" class="soft"/>
  <text x="235" y="368" text-anchor="middle" class="small ink">삭제 없음</text>

  <rect x="445" y="180" width="310" height="250" rx="26" class="card"/>
  <text x="600" y="235" text-anchor="middle" class="label ink">2. 두 번째 실패</text>
  <text x="600" y="285" text-anchor="middle" class="small muted">첫 객체만 생성</text>
  <rect x="490" y="330" width="220" height="60" rx="16" class="accent"/>
  <text x="600" y="368" text-anchor="middle" class="small ink">첫 객체 삭제</text>

  <rect x="810" y="180" width="310" height="250" rx="26" class="card"/>
  <text x="965" y="235" text-anchor="middle" class="label ink">3. DB 저장 실패</text>
  <text x="965" y="285" text-anchor="middle" class="small muted">두 객체 모두 생성</text>
  <rect x="855" y="320" width="220" height="82" rx="16" class="accent"/>
  <text x="965" y="354" text-anchor="middle" class="small ink">두 번째 삭제</text>
  <text x="965" y="382" text-anchor="middle" class="small ink">첫 객체 삭제</text>

  <rect x="190" y="505" width="820" height="82" rx="22" class="accent"/>
  <text x="600" y="545" text-anchor="middle" class="label ink">원칙</text>
  <text x="600" y="575" text-anchor="middle" class="small ink">보상 실패는 로그로 남기고, 최초 실패 원인은 덮지 않는다</text>
</svg>
