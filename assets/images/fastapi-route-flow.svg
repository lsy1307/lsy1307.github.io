<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">경로 계산 API 요청 흐름</title>
  <desc id="desc">Android, Cognito, FastAPI workers, Tmap, OSMnx, CCTV data, DynamoDB 사이의 경로 계산 흐름</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#171a18"/>
    </marker>
    <style>
      .bg{fill:#f5f4ef}.box{fill:#fffef9;stroke:#171a18;stroke-width:3}.accent{fill:#baff3e;stroke:#171a18;stroke-width:3}.soft{fill:#ebeae4;stroke:#171a18;stroke-width:2}.line{stroke:#171a18;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#7cab22;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow)}.muted{fill:#67706a}.ink{fill:#171a18}text{font-family:Pretendard,'Noto Sans KR',Arial,sans-serif}.title{font-size:38px;font-weight:900}.label{font-size:25px;font-weight:850}.small{font-size:20px;font-weight:700}.tiny{font-size:17px;font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <text x="70" y="78" class="title ink">Safe route calculation request flow</text>
  <text x="70" y="114" class="small muted">좌표 요청은 API가 받고, 공간 연산과 외부 경로 조회는 4개 worker가 분산 처리</text>

  <rect x="70" y="240" width="185" height="105" rx="22" class="accent"/>
  <text x="110" y="285" class="label ink">Android</text>
  <text x="110" y="315" class="tiny ink">start/end coords</text>

  <rect x="335" y="220" width="230" height="145" rx="24" class="box"/>
  <text x="375" y="272" class="label ink">FastAPI</text>
  <text x="375" y="304" class="small muted">POST /calculate-route</text>
  <text x="375" y="333" class="tiny muted">Gunicorn · 4 workers</text>

  <rect x="660" y="110" width="205" height="90" rx="18" class="soft"/>
  <text x="700" y="150" class="small ink">Tmap API</text>
  <text x="700" y="178" class="tiny muted">base route</text>

  <rect x="660" y="250" width="205" height="90" rx="18" class="soft"/>
  <text x="700" y="290" class="small ink">OSMnx</text>
  <text x="700" y="318" class="tiny muted">walk graph</text>

  <rect x="660" y="390" width="205" height="90" rx="18" class="soft"/>
  <text x="700" y="430" class="small ink">CCTV data</text>
  <text x="700" y="458" class="tiny muted">GeoPandas join</text>

  <rect x="960" y="250" width="175" height="115" rx="22" class="box"/>
  <text x="998" y="295" class="small ink">DynamoDB</text>
  <text x="998" y="325" class="tiny muted">route history</text>

  <rect x="345" y="470" width="210" height="90" rx="18" class="soft"/>
  <text x="385" y="510" class="small ink">Cognito</text>
  <text x="385" y="538" class="tiny muted">token → user_id</text>

  <path class="line" d="M255 292 H323"/>
  <path class="line" d="M565 260 C615 225 625 175 648 158"/>
  <path class="line" d="M565 292 H648"/>
  <path class="line" d="M565 330 C620 355 625 415 648 433"/>
  <path class="dash" d="M450 470 V378"/>
  <path class="line" d="M865 300 H948"/>
  <path class="line" d="M960 332 C830 585 385 585 260 345"/>

  <text x="585" y="242" class="tiny muted">1. 기준 경로</text>
  <text x="585" y="286" class="tiny muted">2. 그래프 생성</text>
  <text x="585" y="377" class="tiny muted">3. 안전 가중치</text>
  <text x="880" y="238" class="tiny muted">4. 결과 저장</text>
</svg>
