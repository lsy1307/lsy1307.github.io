<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">경로 계산 API 요청 흐름</title>
  <desc id="desc">Android 요청이 FastAPI worker를 거쳐 외부 경로 API, OSM 그래프, CCTV 데이터, 경로 이력 저장소로 이어지는 구조</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#171a18"/>
    </marker>
    <style>
      .bg{fill:#f5f4ef}.card{fill:#fffef9;stroke:#171a18;stroke-width:3}.accent{fill:#baff3e;stroke:#171a18;stroke-width:3}.soft{fill:#ebeae4;stroke:#171a18;stroke-width:2}.line{stroke:#171a18;stroke-width:3;fill:none;marker-end:url(#arrow)}.muted{fill:#67706a}.ink{fill:#171a18}text{font-family:Pretendard,'Noto Sans KR',Arial,sans-serif}.title{font-size:38px;font-weight:900}.label{font-size:27px;font-weight:850}.small{font-size:19px;font-weight:700}.tiny{font-size:16px;font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <text x="70" y="78" class="title ink">Safe route API flow</text>
  <text x="70" y="114" class="small muted">좌표 요청은 API가 받고, 경로 조회와 공간 연산은 worker에서 분산 처리</text>

  <rect x="70" y="250" width="185" height="130" rx="24" class="accent"/>
  <text x="162" y="305" text-anchor="middle" class="label ink">Android</text>
  <text x="162" y="340" text-anchor="middle" class="small ink">좌표 요청</text>

  <rect x="380" y="220" width="250" height="180" rx="28" class="card"/>
  <text x="505" y="278" text-anchor="middle" class="label ink">FastAPI</text>
  <text x="505" y="313" text-anchor="middle" class="small muted">route endpoint</text>
  <text x="505" y="346" text-anchor="middle" class="small muted">4 workers</text>
  <text x="505" y="377" text-anchor="middle" class="tiny muted">CPU · memory bound</text>

  <rect x="760" y="155" width="190" height="88" rx="18" class="soft"/>
  <text x="855" y="192" text-anchor="middle" class="small ink">기준 경로</text>
  <text x="855" y="218" text-anchor="middle" class="tiny muted">external API</text>

  <rect x="760" y="290" width="190" height="88" rx="18" class="soft"/>
  <text x="855" y="327" text-anchor="middle" class="small ink">보행 그래프</text>
  <text x="855" y="353" text-anchor="middle" class="tiny muted">OSM network</text>

  <rect x="760" y="425" width="190" height="88" rx="18" class="soft"/>
  <text x="855" y="462" text-anchor="middle" class="small ink">안전 데이터</text>
  <text x="855" y="488" text-anchor="middle" class="tiny muted">spatial join</text>

  <rect x="760" y="545" width="190" height="82" rx="18" class="card"/>
  <text x="855" y="580" text-anchor="middle" class="small ink">경로 이력</text>
  <text x="855" y="606" text-anchor="middle" class="tiny muted">save result</text>

  <rect x="380" y="465" width="250" height="88" rx="18" class="soft"/>
  <text x="505" y="503" text-anchor="middle" class="small ink">인증 사용자</text>
  <text x="505" y="529" text-anchor="middle" class="tiny muted">token → user id</text>

  <path class="line" d="M255 292 H368"/>
  <text x="312" y="277" text-anchor="middle" class="tiny muted">request</text>
  <path class="line" d="M380 352 H267"/>
  <text x="322" y="378" text-anchor="middle" class="tiny muted">response</text>
  <path class="line" d="M748 198 C700 220 665 250 642 275"/>
  <path class="line" d="M748 334 H642"/>
  <path class="line" d="M748 468 C700 440 665 390 642 360"/>
  <path class="line" d="M505 465 V412"/>
  <path class="line" d="M630 382 C690 455 715 575 748 586"/>
</svg>
