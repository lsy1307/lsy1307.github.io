<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">부하 테스트 환경 생명주기</title>
  <desc id="desc">Start, Run, Stop workflow가 테스트 데이터베이스와 부하 발생기를 만들고 정리하는 흐름</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111111"/>
    </marker>
    <style>
      .bg{fill:#f7f7f4}.card{fill:#ffffff;stroke:#111111;stroke-width:3}.accent{fill:#dededb;stroke:#111111;stroke-width:3}.soft{fill:#ececea;stroke:#111111;stroke-width:2}.line{stroke:#111111;stroke-width:3;fill:none;marker-end:url(#arrow)}.muted{fill:#626262}.ink{fill:#111111}text{font-family:Pretendard,'Noto Sans KR',Arial,sans-serif}.title{font-size:38px;font-weight:900}.label{font-size:29px;font-weight:850}.small{font-size:19px;font-weight:700}.tiny{font-size:16px;font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <text x="70" y="78" class="title ink">Load-test lifecycle</text>
  <text x="70" y="114" class="small muted">필요할 때만 테스트 환경을 만들고, 실행 후 원래 dev 환경으로 복구</text>

  <rect x="90" y="175" width="250" height="125" rx="24" class="accent"/>
  <text x="215" y="230" text-anchor="middle" class="label ink">Start</text>
  <text x="215" y="265" text-anchor="middle" class="small ink">환경 생성</text>

  <rect x="475" y="175" width="250" height="125" rx="24" class="card"/>
  <text x="600" y="230" text-anchor="middle" class="label ink">Run</text>
  <text x="600" y="265" text-anchor="middle" class="small muted">k6 실행</text>

  <rect x="860" y="175" width="250" height="125" rx="24" class="accent"/>
  <text x="985" y="230" text-anchor="middle" class="label ink">Stop</text>
  <text x="985" y="265" text-anchor="middle" class="small ink">정리 · 복구</text>

  <path class="line" d="M340 238 H463"/>
  <path class="line" d="M725 238 H848"/>

  <rect x="90" y="415" width="220" height="105" rx="20" class="soft"/>
  <text x="200" y="458" text-anchor="middle" class="small ink">운영 스냅샷</text>
  <text x="200" y="488" text-anchor="middle" class="tiny muted">recent data shape</text>

  <rect x="365" y="415" width="220" height="105" rx="20" class="card"/>
  <text x="475" y="458" text-anchor="middle" class="small ink">테스트 DB</text>
  <text x="475" y="488" text-anchor="middle" class="tiny muted">private access</text>

  <rect x="640" y="415" width="220" height="105" rx="20" class="card"/>
  <text x="750" y="458" text-anchor="middle" class="small ink">설정 저장소</text>
  <text x="750" y="488" text-anchor="middle" class="tiny muted">endpoint switch</text>

  <rect x="915" y="415" width="220" height="105" rx="20" class="card"/>
  <text x="1025" y="458" text-anchor="middle" class="small ink">부하 발생기</text>
  <text x="1025" y="488" text-anchor="middle" class="tiny muted">ephemeral runner</text>

  <rect x="490" y="565" width="220" height="70" rx="18" class="soft"/>
  <text x="600" y="608" text-anchor="middle" class="small ink">Stage API</text>

  <path class="line" d="M310 468 H353"/>
  <path class="line" d="M585 468 H628"/>
  <path class="line" d="M750 520 C730 555 690 585 710 600"/>
  <path class="line" d="M1025 415 V312"/>
  <path class="line" d="M915 468 H872"/>
  <path class="line" d="M915 500 C820 575 750 600 722 600"/>
</svg>
