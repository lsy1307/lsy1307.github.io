<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">부하 테스트 환경 생명주기</title>
  <desc id="desc">Start, Run, Stop workflow가 RDS, Parameter Store, stage API, k6 generator를 생성하고 정리하는 흐름</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#171a18"/>
    </marker>
    <style>
      .bg{fill:#f5f4ef}.panel{fill:#fffef9;stroke:#171a18;stroke-width:3}.soft{fill:#ebeae4;stroke:#171a18;stroke-width:2}.accent{fill:#baff3e;stroke:#171a18;stroke-width:3}.muted{fill:#67706a}.ink{fill:#171a18}.line{stroke:#171a18;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#7cab22;stroke-width:3;fill:none;stroke-dasharray:9 8;marker-end:url(#arrow)}text{font-family:Pretendard,'Noto Sans KR',Arial,sans-serif}.small{font-size:22px;font-weight:700}.label{font-size:28px;font-weight:850}.tiny{font-size:18px;font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <text x="70" y="78" class="label ink">Load-test environment lifecycle</text>
  <text x="70" y="113" class="small muted">운영 스냅샷 기반 RDS와 k6 부하 발생기를 필요할 때만 생성하고 정리</text>

  <rect x="70" y="170" width="280" height="120" rx="22" class="accent"/>
  <text x="105" y="220" class="label ink">Start</text>
  <text x="105" y="255" class="small ink">RDS 복원 · 설정 전환</text>

  <rect x="460" y="170" width="280" height="120" rx="22" class="panel"/>
  <text x="495" y="220" class="label ink">Run</text>
  <text x="495" y="255" class="small ink">k6 실행 · 지표 전송</text>

  <rect x="850" y="170" width="280" height="120" rx="22" class="accent"/>
  <text x="885" y="220" class="label ink">Stop</text>
  <text x="885" y="255" class="small ink">dev 복구 · 리소스 삭제</text>

  <path class="line" d="M350 230 H448"/>
  <path class="line" d="M740 230 H838"/>

  <rect x="95" y="405" width="210" height="95" rx="18" class="soft"/>
  <text x="125" y="445" class="small ink">Prod RDS</text>
  <text x="125" y="475" class="tiny muted">automated snapshot</text>

  <rect x="360" y="385" width="220" height="135" rx="18" class="panel"/>
  <text x="395" y="430" class="small ink">Load-test RDS</text>
  <text x="395" y="460" class="tiny muted">private subnet</text>
  <text x="395" y="489" class="tiny muted">snapshot restore</text>

  <rect x="640" y="385" width="220" height="135" rx="18" class="panel"/>
  <text x="675" y="430" class="small ink">Parameter Store</text>
  <text x="675" y="460" class="tiny muted">/loadtest endpoint</text>
  <text x="675" y="489" class="tiny muted">profile override</text>

  <rect x="920" y="385" width="210" height="135" rx="18" class="panel"/>
  <text x="955" y="430" class="small ink">k6 Generator</text>
  <text x="955" y="460" class="tiny muted">ephemeral EC2</text>
  <text x="955" y="489" class="tiny muted">SSM RunCommand</text>

  <rect x="475" y="555" width="250" height="78" rx="18" class="soft"/>
  <text x="515" y="588" class="small ink">Stage API</text>
  <text x="515" y="616" class="tiny muted">dev,loadtest profile</text>

  <path class="dash" d="M305 450 H348"/>
  <path class="dash" d="M580 450 H628"/>
  <path class="dash" d="M750 520 V548"/>
  <path class="line" d="M920 455 H875"/>
  <path class="line" d="M920 500 C820 585 760 594 735 594"/>
  <path class="dash" d="M850 250 C750 330 700 355 680 382"/>
  <path class="dash" d="M990 290 V372"/>

  <text x="350" y="359" class="tiny muted">snapshot restore</text>
  <text x="625" y="359" class="tiny muted">endpoint write</text>
  <text x="815" y="579" class="tiny muted">HTTP traffic</text>
</svg>
