<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Terraform 환경과 모듈 경계</title>
  <desc id="desc">환경별 root module과 재사용 module, 공유 리소스, state backend의 관계</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#171a18"/>
    </marker>
    <style>
      .bg{fill:#f5f4ef}.card{fill:#fffef9;stroke:#171a18;stroke-width:3}.soft{fill:#ebeae4;stroke:#171a18;stroke-width:2}.accent{fill:#baff3e;stroke:#171a18;stroke-width:3}.line{stroke:#171a18;stroke-width:3;fill:none;marker-end:url(#arrow)}.muted{fill:#67706a}.ink{fill:#171a18}text{font-family:Pretendard,'Noto Sans KR',Arial,sans-serif}.title{font-size:38px;font-weight:900}.label{font-size:26px;font-weight:850}.small{font-size:19px;font-weight:700}.tiny{font-size:16px;font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <text x="70" y="78" class="title ink">Terraform boundaries</text>
  <text x="70" y="114" class="small muted">환경은 state를 나누고, module은 함께 바뀌는 리소스를 묶음</text>

  <rect x="80" y="175" width="210" height="80" rx="18" class="accent"/>
  <text x="185" y="225" text-anchor="middle" class="label ink">prod</text>
  <rect x="80" y="285" width="210" height="80" rx="18" class="card"/>
  <text x="185" y="335" text-anchor="middle" class="label ink">stage</text>
  <rect x="80" y="395" width="210" height="80" rx="18" class="card"/>
  <text x="185" y="445" text-anchor="middle" class="label ink">monitoring</text>
  <rect x="80" y="505" width="210" height="80" rx="18" class="card"/>
  <text x="185" y="555" text-anchor="middle" class="label ink">load test</text>

  <rect x="455" y="205" width="270" height="130" rx="24" class="card"/>
  <text x="590" y="255" text-anchor="middle" class="label ink">app module</text>
  <text x="590" y="288" text-anchor="middle" class="small muted">EC2 · RDS · SG</text>

  <rect x="455" y="395" width="270" height="130" rx="24" class="card"/>
  <text x="590" y="445" text-anchor="middle" class="label ink">monitoring</text>
  <text x="590" y="478" text-anchor="middle" class="small muted">Grafana · Loki</text>

  <rect x="855" y="255" width="260" height="145" rx="24" class="accent"/>
  <text x="985" y="310" text-anchor="middle" class="label ink">shared</text>
  <text x="985" y="343" text-anchor="middle" class="small ink">S3 · CDN</text>
  <text x="985" y="372" text-anchor="middle" class="small ink">Lambda · ACM</text>

  <rect x="850" y="505" width="270" height="80" rx="18" class="soft"/>
  <text x="985" y="537" text-anchor="middle" class="small ink">state backend</text>
  <text x="985" y="563" text-anchor="middle" class="tiny muted">env별 key · lock</text>

  <path class="line" d="M290 215 H443"/>
  <path class="line" d="M290 325 C360 325 382 285 443 275"/>
  <path class="line" d="M290 435 H443"/>
  <path class="line" d="M290 545 C365 545 382 325 443 305"/>
  <path class="line" d="M725 270 C780 275 805 305 843 320"/>
  <path class="line" d="M725 460 C785 450 805 390 843 365"/>
  <path class="line" d="M185 585 C370 640 770 640 955 590"/>
</svg>
