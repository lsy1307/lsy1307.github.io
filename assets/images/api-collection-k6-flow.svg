<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">요청 컬렉션 기반 k6 스크립트 생성 흐름</title>
  <desc id="desc">요청 컬렉션을 가져와 API 그룹을 선택하고 k6 스크립트를 생성한 뒤 실행 요약을 남기는 흐름</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111111"/>
    </marker>
    <style>
      .bg{fill:#f7f7f4}.card{fill:#ffffff;stroke:#111111;stroke-width:3}.accent{fill:#dededb;stroke:#111111;stroke-width:3}.soft{fill:#ececea;stroke:#111111;stroke-width:2}.guard{fill:#ffffff;stroke:#8a8a86;stroke-width:3;stroke-dasharray:10 8}.line{stroke:#111111;stroke-width:3;fill:none;marker-end:url(#arrow)}.muted{fill:#626262}.ink{fill:#111111}text{font-family:Pretendard,'Noto Sans KR',Arial,sans-serif}.title{font-size:38px;font-weight:900}.label{font-size:27px;font-weight:850}.small{font-size:19px;font-weight:700}.tiny{font-size:16px;font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <text x="70" y="78" class="title ink">Request collection → k6</text>
  <text x="70" y="114" class="small muted">요청 예시를 단일 출처로 두고, 실행 시점에 부하 테스트 스크립트로 변환</text>

  <rect x="70" y="190" width="220" height="125" rx="24" class="accent"/>
  <text x="180" y="245" text-anchor="middle" class="label ink">요청 컬렉션</text>
  <text x="180" y="280" text-anchor="middle" class="small ink">method · body</text>

  <rect x="370" y="190" width="220" height="125" rx="24" class="card"/>
  <text x="480" y="245" text-anchor="middle" class="label ink">그룹 선택</text>
  <text x="480" y="280" text-anchor="middle" class="small muted">실행 범위 입력</text>

  <rect x="670" y="190" width="220" height="125" rx="24" class="card"/>
  <text x="780" y="245" text-anchor="middle" class="label ink">스크립트 생성</text>
  <text x="780" y="280" text-anchor="middle" class="small muted">필터 · 변환</text>

  <rect x="970" y="190" width="160" height="125" rx="24" class="accent"/>
  <text x="1050" y="245" text-anchor="middle" class="label ink">k6 실행</text>
  <text x="1050" y="280" text-anchor="middle" class="small ink">부하 테스트</text>

  <path class="line" d="M290 252 H358"/>
  <path class="line" d="M590 252 H658"/>
  <path class="line" d="M890 252 H958"/>

  <rect x="255" y="410" width="300" height="105" rx="22" class="guard"/>
  <text x="405" y="454" text-anchor="middle" class="label ink">위험 요청 보호</text>
  <text x="405" y="488" text-anchor="middle" class="small muted">삭제·차단은 명시 선택</text>

  <rect x="645" y="410" width="300" height="105" rx="22" class="soft"/>
  <text x="795" y="454" text-anchor="middle" class="label ink">실행 요약</text>
  <text x="795" y="488" text-anchor="middle" class="small muted">선택 / 제외 목록 기록</text>

  <path class="line" d="M480 315 V398"/>
  <path class="line" d="M780 315 V398"/>
  <path class="line" d="M555 462 H633"/>

  <text x="600" y="590" text-anchor="middle" class="small muted">기준을 하나로 만들고, 테스트마다 무엇을 실행했는지 남기는 것이 핵심</text>
</svg>
