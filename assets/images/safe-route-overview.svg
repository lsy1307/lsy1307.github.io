<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">기준 경로와 안전 경로 비교</title>
  <desc id="desc">기준 경로 주변 탐색 범위 안에서 CCTV 밀도가 높은 안전 경로를 다시 계산하는 개념도</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L12,4 z" fill="#111111"/>
    </marker>
    <style>
      .bg{fill:#f7f7f4}.panel{fill:#ffffff;stroke:#111111;stroke-width:3}.corridor{fill:#dededb;opacity:.34;stroke:#8a8a86;stroke-width:4}.grid{stroke:#d2d2cf;stroke-width:2}.base{stroke:#626262;stroke-width:9;fill:none;stroke-linecap:round;stroke-dasharray:18 18}.safe{stroke:#111111;stroke-width:10;fill:none;stroke-linecap:round;marker-end:url(#arrow)}.safeKey{stroke:#111111;stroke-width:9;fill:none;stroke-linecap:round}.node{fill:#dededb;stroke:#111111;stroke-width:4}.cctv{fill:#111111}.muted{fill:#626262}.ink{fill:#111111}text{font-family:Pretendard,'Noto Sans KR',Arial,sans-serif}.title{font-size:38px;font-weight:900}.label{font-size:24px;font-weight:850}.small{font-size:18px;font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <rect x="55" y="55" width="1090" height="565" rx="28" class="panel"/>
  <text x="90" y="105" class="title ink">Base route vs safe route</text>
  <text x="90" y="140" class="small muted">기준 경로 주변에서 안전 가중치를 반영한 대체 경로를 재탐색</text>

  <g opacity=".8">
    <path class="grid" d="M120 210 H1080M120 290H1080M120 370H1080M120 450H1080M120 530H1080"/>
    <path class="grid" d="M190 175 V560M310 175V560M430 175V560M550 175V560M670 175V560M790 175V560M910 175V560M1030 175V560"/>
  </g>

  <path class="corridor" d="M160 475 C300 330 390 345 500 315 C660 270 770 245 1000 205 L1035 285 C820 315 710 335 560 385 C430 430 330 410 210 535 Z"/>
  <path class="base" d="M170 500 C320 360 420 370 535 345 C705 305 805 275 1015 245"/>
  <path class="safe" d="M170 500 C270 430 350 470 465 420 C575 372 610 302 735 335 C850 365 915 310 996 255"/>

  <circle cx="170" cy="500" r="18" class="node"/>
  <text x="125" y="548" class="label ink">Start</text>
  <circle cx="1015" cy="245" r="18" class="node"/>
  <text x="985" y="210" class="label ink">End</text>

  <circle cx="305" cy="430" r="7" class="cctv"/><circle cx="335" cy="456" r="7" class="cctv"/><circle cx="430" cy="430" r="7" class="cctv"/>
  <circle cx="575" cy="355" r="7" class="cctv"/><circle cx="615" cy="320" r="7" class="cctv"/><circle cx="650" cy="332" r="7" class="cctv"/>
  <circle cx="790" cy="335" r="7" class="cctv"/><circle cx="835" cy="350" r="7" class="cctv"/><circle cx="900" cy="305" r="7" class="cctv"/>

  <rect x="790" y="462" width="290" height="96" rx="18" class="panel"/>
  <path class="base" d="M825 495 H895"/>
  <text x="920" y="502" class="small muted">기준 경로</text>
  <path class="safeKey" d="M825 532 H895"/>
  <text x="920" y="539" class="small ink">안전 경로</text>
</svg>
